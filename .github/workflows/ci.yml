name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      # Dummy credentials so the boto3 credential chain resolves in the clean
      # CI environment (moto-mocked tests still exercise the real client setup).
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package (dev + tui extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tui]"

      # scripts/lint.sh runs ruff check, ruff format --check, mypy, and the
      # import-linter layered-architecture gate (it falls back to PATH tools
      # when no local venv is present, so it is CI-friendly).
      - name: Lint (ruff, mypy, import-linter)
        run: ./scripts/lint.sh

      - name: Test (pytest)
        run: ./scripts/test.sh
